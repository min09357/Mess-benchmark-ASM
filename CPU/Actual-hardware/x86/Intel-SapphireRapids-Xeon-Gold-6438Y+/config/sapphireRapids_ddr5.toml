stream-core-count = 31
stream-core-count-socket = 31 
stream-numactl-additional-args = "numactl --membind=0"
ptrchase-core = "0"
ptrchase-numactl-additional-args = "--membind=0"

random-generator = "stream"   # "stream" or "random"

rwratio-min = 0
rwratio-max = 100
# rwratio-step = 20
rwratio-step = 50

# stream-pauses = [0, 5, 10, 15, 20, 25, 30, 35, 40, 45, 50, 55, 60, 65, 70, 80, 90, 100, 120, 140, 160, 180, 200, 220, 260, 300, 340, 380, 450, 550, 600, 700, 800, 900, 1000, 1500, 2000, 3000, 5000, 40000, 100000, 500000, 1000000]
stream-pauses = [0, 10, 100, 1000]

point-reps = 3
bw-meas-reps = 1
lat-meas-reps = 1

# time-stream-stabilize= 15   # warm-up time. ensures system reaches steady-state.
time-stream-stabilize= 5
time-after-bw = 4   # waiting time before kill STREAM process
time-after-stream-termination = 0   # waiting time before next step

[Counters]
bw-tool = "perf"
bw-tool-path = "perf"
bw-tool-cores = "0"

# bw-tool-sample-time = "5s"
bw-tool-sample-time = "2s"

bw-tool-counters="""\
unc_m_cas_count.rd,\
unc_m_cas_count.wr,\
"""
lat-tool = "perf"
lat-tool-path = "perf"
lat-tool-counters = "cycles:u,instructions:u,r2008:u,r1008:u"

[Processing]
# smooth-savgol-window-length = 11
smooth-savgol-window-length = 4
# smooth-savgol-polyorder = 3
smooth-savgol-polyorder = 2


[Benchmarks]
# ptrchase-num-instructions = 200000000   # total length of chain
ptrchase-num-instructions = 10000000
# ptrchase-num-iterations = 5000          # num of loop. if low, large loop block, high L1 instruction cache miss. else if high, small loop block, large loop overheads(branch, condition check, ...)
ptrchase-num-iterations = 5000
ptrchase-array-size = "1 * 1024 * 1024 * 1024" 
